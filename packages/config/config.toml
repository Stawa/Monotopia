[web]
development = true
address = "127.0.0.1"
port = 443
ports = [17091]
loginUrl = "login.growtopiagame.com"
cdnUrl = "www.growtopia1.com"

[web.maintenance]
enable = false
message = "Maintenance Woi"

[web.tls]
key = "./.cache/ssl/_wildcard.monotopia.app-key.pem"
cert = "./.cache/ssl/_wildcard.monotopia.app.pem"

[webFrontend]
root = "./.cache/website"
port = 8080

[webFrontend.tls]
key = "./.cache/ssl/_wildcard.monotopia.app-key.pem"
cert = "./.cache/ssl/_wildcard.monotopia.app.pem"

[server]
bypassVersionCheck = true
logLevel = "info"
